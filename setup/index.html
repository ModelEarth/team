<!DOCTYPE html>
<html lang="en-us">
<head>
<meta charset="utf-8">
<meta http-equiv="content-type" content="text/html; charset=UTF-8">
<title>Webroot Manager</title>
<link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link type="text/css" rel="stylesheet" href="../../localsite/css/base.css" id="/localsite/css/base.css" />
<link type="text/css" rel="stylesheet" href="../css/common.css" />
<script type="text/javascript" src="../../localsite/js/localsite.js?showheader=true&showsearch=false"></script>
<script type="text/javascript" src="../js/common.js"></script>
<script type="text/javascript" src="../js/setup.js"></script>

<script>
// Create OS detection panel using shared function
autoCreateOSDetectionPanel('#commonSetupDiv');

function normalizeAiModeValue(value) {
    const normalized = (value || '').toString().trim().toLowerCase();
    if (normalized === 'yes' || normalized === 'with' || normalized === 'with-ai') return 'yes';
    if (normalized === 'no' || normalized === 'without' || normalized === 'without-ai') return 'no';
    if (normalized === 'both') return 'both';
    return '';
}

function getCurrentAiModeValue() {
    if (typeof getAiModePreference === 'function') {
        const aiFromSetup = normalizeAiModeValue(getAiModePreference());
        if (aiFromSetup) return aiFromSetup;
    }
    const storedAiMode = normalizeAiModeValue(localStorage.getItem('use-ai-mode'));
    return storedAiMode || 'no';
}

function syncDeployCliVisibility() {
    const deployChanges = document.getElementById('deployChanges');
    if (!deployChanges) return;
    const withoutAiMode = getCurrentAiModeValue() === 'no';
    deployChanges.style.display = withoutAiMode ? 'none' : '';
}

function syncDeployGitVisibility() {
    const withAiMode = getCurrentAiModeValue() === 'yes';
    const deployGit = document.getElementById('deployGit');
    const showDeployGitBtn = document.getElementById('showDeployGit');
    if (deployGit) deployGit.style.display = withAiMode ? 'none' : '';
    if (showDeployGitBtn) showDeployGitBtn.style.display = withAiMode ? 'none' : '';
}

function getWebrootRepoLinkHtml() {
    const currentPath = window.location.href;
    let myRepo = 'PartnerTools';

    const githubPagesMatch = currentPath.match(/\/\/([^.]+)\.github\.io/);
    if (githubPagesMatch && githubPagesMatch[1]) {
        myRepo = githubPagesMatch[1];
    } else if (currentPath.includes('localhost') || currentPath.includes('model.earth')) {
        myRepo = 'modelearth';
    }

    return "<a href='https://github.com/" + myRepo + "/webroot/' target='github_fork'>github.com/" + myRepo + "/webroot</a>";
}

function replaceWebrootRepoLinkText() {
    const webrootSetup = document.getElementById('webrootSetup');
    if (!webrootSetup) return;
    webrootSetup.innerHTML = webrootSetup.innerHTML.replace(/the webroot repo/g, getWebrootRepoLinkHtml());
}

function runSetupStep(stepName, fn) {
    try {
        fn();
    } catch (error) {
        console.error('team/setup initialization failed during ' + stepName, error);
    }
}

if (!window.setupDeployCliAiModeBound) {
    document.addEventListener('aiModeChanged', syncDeployCliVisibility);
    document.addEventListener('aiModeChanged', syncDeployGitVisibility);
    window.setupDeployCliAiModeBound = true;
}

waitForElm('#textInPage').then(() => {
    runSetupStep('webroot setup', () => setupWebrootSetup('webrootSetup'));
    runSetupStep('git account fields', () => setupGitAccountFields('textInPage'));
    runSetupStep('webroot repo text replacement', replaceWebrootRepoLinkText);
    runSetupStep('fork repo commands', () => updateForkReposCommands());
});

waitForElm('#quickstartDiv').then(() => {
    runSetupStep('quickstart instructions', () => setupQuickstartInstructions('quickstartDiv'));
});

waitForElm('#combined-rust-api-container').then(() => {
    runSetupStep('rust api status panel', () => createRustApiStatusPanel('combined-rust-api-container', false));
});

waitForElm('#extraRepos').then(() => {
    runSetupStep('trade flow repos', () => setupTradeFlowRepos('extraRepos'));
    runSetupStep('gemini resources', () => setupGeminiResources());
});

waitForElm('#deployChanges').then(() => {
    runSetupStep('deploy cli markdown', () => loadMarkdown('../admin/github/deploy-cli.md', 'deployChanges', '_parent', 1, syncDeployCliVisibility));
});

waitForElm('#deployGitDiv').then(() => {
    runSetupStep('deploy git markdown', () => loadMarkdown('../admin/github/deploy-git.md', 'deployGitDiv', '_parent', 1, syncDeployGitVisibility));
});

function setupDeployGitLayout() {
    const showDeployGitBtn = document.getElementById('showDeployGit');
    const deployGitDiv = document.getElementById('deployGitDiv');
    if (!showDeployGitBtn || !deployGitDiv) return;

    let titleEl = deployGitDiv.querySelector('#manualsubmodulerefresh') || deployGitDiv.querySelector('h1, h2');
    if (!titleEl) return;

    if (titleEl.tagName !== 'H1') {
        const newTitle = document.createElement('h1');
        newTitle.innerHTML = titleEl.innerHTML;
        titleEl.replaceWith(newTitle);
        titleEl = newTitle;
    }
    titleEl.id = 'manualsubmodulerefresh';
    titleEl.className = 'card-title';
    titleEl.style.margin = '0';
    titleEl.textContent = 'Submodule Deployment Commands (without AI)';

    let headerRow = document.getElementById('deploy-git-header-row');
    if (!headerRow) {
        headerRow = document.createElement('div');
        headerRow.id = 'deploy-git-header-row';
        headerRow.style.display = 'flex';
        headerRow.style.alignItems = 'center';
        headerRow.style.gap = '10px';
        headerRow.style.marginBottom = '10px';
        deployGitDiv.insertBefore(headerRow, deployGitDiv.firstChild);
    }

    if (titleEl.parentElement !== headerRow) {
        headerRow.appendChild(titleEl);
    }
    if (showDeployGitBtn.parentElement !== headerRow) {
        headerRow.appendChild(showDeployGitBtn);
    }
    showDeployGitBtn.style.marginLeft = 'auto';

    let toggleArea = document.getElementById('deploy-git-toggle-content');
    if (!toggleArea) {
        toggleArea = document.createElement('div');
        toggleArea.id = 'deploy-git-toggle-content';
        toggleArea.style.display = 'none';
        const nodesToMove = [];
        let node = headerRow.nextSibling;
        while (node) {
            nodesToMove.push(node);
            node = node.nextSibling;
        }
        nodesToMove.forEach((item) => toggleArea.appendChild(item));
        deployGitDiv.appendChild(toggleArea);
    }

    let summaryLine = document.getElementById('deploy-git-summary-line');
    if (!summaryLine) {
        summaryLine = document.createElement('div');
        summaryLine.id = 'deploy-git-summary-line';
        summaryLine.style.marginBottom = '10px';
        summaryLine.style.color = 'var(--text-secondary)';
        summaryLine.textContent = 'Commands to push/pull without AI shortcuts.';
    }
    if (summaryLine.parentElement !== deployGitDiv) {
        deployGitDiv.insertBefore(summaryLine, toggleArea);
    }

    showDeployGitBtn.textContent = getComputedStyle(toggleArea).display === 'none'
        ? 'Show Commands'
        : 'Hide Commands';
    summaryLine.style.display = getComputedStyle(toggleArea).display === 'none' ? 'block' : 'none';

    if (showDeployGitBtn.dataset.deployGitBound !== 'true') {
        showDeployGitBtn.dataset.deployGitBound = 'true';
        showDeployGitBtn.addEventListener('click', () => {
            const isHidden = getComputedStyle(toggleArea).display === 'none';
            toggleArea.style.display = isHidden ? 'block' : 'none';
            showDeployGitBtn.textContent = isHidden ? 'Hide Commands' : 'Show Commands';
            summaryLine.style.display = isHidden ? 'none' : 'block';
        });
    }

    const withoutAiMode = getCurrentAiModeValue() === 'no';
    if (withoutAiMode && getComputedStyle(toggleArea).display === 'none') {
        showDeployGitBtn.click();
    }
}

waitForElm('#coding-with-right').then(() => {
    const right = document.getElementById('coding-with-right');
    if (!right) return;
    right.style.alignItems = 'flex-start';
    right.style.textAlign = 'left';
    const mac = right.querySelector('.mac-instructions');
    if (mac) mac.style.textAlign = 'left';
});

waitForElm('#deployGitDiv h1, #deployGitDiv h2').then(() => {
    setupDeployGitLayout();
});
</script>
<style>
#textInPage { container-type: inline-size; }
#githubAccountFields { float: right; margin-left: 16px; }
@container (max-width: 450px) {
    #githubAccountFields { float: none; }
}
#localhost-toggle-wrapper { margin-top: -18px; }
@container (max-width: 639px) {
    #localhost-toggle-wrapper { margin-top: 0; }
    #coding-with-right { flex: 0 0 100%; margin-left: 0 !important; }
}
</style>
</head>

<body>
<div class="content contentpadding">
    <a href="../admin">Partner Tools</a>
    <div class="large-list"><h1>Webroot Manager</h1></div>

    <div class="card" id="textInPage">
      <div id="webrootSetup"></div>
    </div>
    <div id="commonSetupDiv"></div>
    <div class="card" id="deployChanges"></div>
    <div id="quickstartDiv" class="card"></div>
    <div id="combined-rust-api-container" class="card"></div>
    <div class="card" id="extraRepos"></div>
    <button id="showDeployGit" class="btn">Show Commands</button>
    <div id="deployGit">
        <div class="card" id="deployGitDiv"></div>
    </div>
</div>
</body>
</html>
